name: Scheduled Publish (Vercel Rebuild)

on:
  schedule:
    # 매일 09:00 KST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "✅ Vercel 재배포 트리거 완료"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK 미설정 — 스킵"
          fi
