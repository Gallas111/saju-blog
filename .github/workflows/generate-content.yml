name: Generate Blog Content

on:
  schedule:
    # 09:00 KST (00:00 UTC) - 1번째 포스트
    - cron: "0 0 * * *"
    # 13:00 KST (04:00 UTC) - 2번째 포스트
    - cron: "0 4 * * *"
    # 17:00 KST (08:00 UTC) - 3번째 포스트
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node .github/scripts/generate-posts.js

      - name: Check for new files
        id: check
        run: |
          if [ -n "$(git status --porcelain content/posts/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          DATE=$(date +%Y-%m-%d)
          HOUR=$(TZ=Asia/Seoul date +%H:%M)
          git commit -m "feat: AI 자동 블로그 포스트 추가 (${DATE} ${HOUR})"
          git push
