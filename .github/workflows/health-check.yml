name: Health Check Bot

on:
  schedule:
    - cron: '0 16 * * 3,6'  # 수, 토
  workflow_dispatch:

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Notify Telegram (Start)
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🏥 [Saju Blog] Health check 시작..." || true

      - name: Run Health Check
        id: healthcheck
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npx tsx scripts/health-check.ts

      - name: Commit fixes if any
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotePath false
          git add .
          git diff --staged --quiet && echo "No fixes needed" && exit 0
          git commit -m "fix(health-check): auto-fix broken images, links, and MDX syntax"

          if ! git pull --rebase origin main; then
            echo "Rebase conflict, resolving..."
            git diff --name-only --diff-filter=U -z | while IFS= read -r -d '' file; do
              git checkout --theirs "$file"
              git add "$file"
            done
            GIT_EDITOR=true git rebase --continue
          fi

          git push origin main

      - name: Notify Telegram (Result)
        if: always()
        run: |
          FIXES=$(git log --oneline -1 2>/dev/null | grep -c "health-check" || echo "0")
          if [ "${{ job.status }}" = "success" ]; then
            if [ "$FIXES" -gt 0 ]; then
              MSG="✅ [Saju Blog] Health check 완료 — 오류 수정 후 배포됨"
            else
              MSG="✅ [Saju Blog] Health check 완료 — 이상 없음"
            fi
          else
            MSG="❌ [Saju Blog] Health check 실패 — 로그 확인 필요"
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${MSG}" || true
